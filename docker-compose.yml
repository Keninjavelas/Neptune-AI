services:
  postgres:
    image: postgres:16-alpine
    container_name: neptune_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: neptune
      POSTGRES_PASSWORD: neptune
      POSTGRES_DB: neptune
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neptune"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  mqtt:
    image: eclipse-mosquitto:latest
    container_name: neptune_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data

volumes:
  postgres_data:
  mosquitto_data:
