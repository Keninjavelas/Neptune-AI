services:
  postgres:
    image: postgres:16-alpine
    container_name: aquaflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aquaflow
      POSTGRES_PASSWORD: aquaflow
      POSTGRES_DB: aquaflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquaflow"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  mqtt:
    image: eclipse-mosquitto:2-alpine
    container_name: aquaflow_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data

volumes:
  postgres_data:
  mosquitto_data:
      DATABASE_URL: postgresql://poseidon:poseidon@timescaledb:5432/poseidon
      MQTT_BROKER_URL: mqtt://mosquitto:1883

  processing:
    build:
      context: ./backend
      dockerfile: Dockerfile.processing
    container_name: poseidon_processing
    restart: unless-stopped
    depends_on:
      - timescaledb
      - redis
      - mosquitto
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://poseidon:poseidon@timescaledb:5432/poseidon
      MQTT_BROKER_URL: mqtt://mosquitto:1883

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: poseidon_backend
    restart: unless-stopped
    depends_on:
      - timescaledb
      - redis
      - mosquitto
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://poseidon:poseidon@timescaledb:5432/poseidon
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    ports:
      - "3001:3001"
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: poseidon_frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.local
    ports:
      - "3000:3000"

  edge_ai:
    build:
      context: ./edge_ai
      dockerfile: Dockerfile
    container_name: poseidon_edge_ai
    restart: unless-stopped
    depends_on:
      - mosquitto
    env_file:
      - ./edge_ai/.env
    environment:
      MQTT_BROKER_URL: mqtt://mosquitto:1883

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
